name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
      - run: shards install
      - run: crystal spec --order random

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
      - run: crystal tool format --check

  sequel-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false
      - run: gem install sequel sqlite3
      - run: shards install
      - run: ruby ci/sequel_compat/encrypt.rb | crystal run ci/sequel_compat/decrypt.cr
